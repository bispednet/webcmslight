name: Deploy to HOST.it via FTP

on:
  push:
    branches:
      - main          # deploy automatico su ogni push a main
  workflow_dispatch:  # deploy manuale dal tab "Actions" su GitHub

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout codice
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # necessario per il diff con il deploy precedente

      - name: Deploy su HOST.it via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server:     ${{ secrets.FTP_HOST }}
          username:   ${{ secrets.FTP_USER }}
          password:   ${{ secrets.FTP_PASS }}
          port:       21
          protocol:   ftps          # FTP esplicito su TLS — più stabile su HOST.it
          timeout:    120000        # 2 minuti: HOST.it può essere lento ad accettare
          local-dir:  ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}  # es. /public_html/ o /httpdocs/
          dry-run:    false

          # File e cartelle da NON caricare mai
          exclude: |
            **/.git*
            **/.git*/**
            **/runtime/**
            **/runtime
            **/.env.php
            **/storage/gemini-rate-limit.json
            **/storage/*.log
            **/storage/*.lock
            **/node_modules/**
            **/_migration.local/**
            **/BISPED_*.md
            **/README.md
            **/*.local.*
            **/playwright_*.py
            **/runtime/mariadb-data/**
